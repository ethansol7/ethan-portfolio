<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      (function redirectToIndex() {
        const isGithubIo = window.location.hostname.endsWith(".github.io");
        const username = isGithubIo ? window.location.hostname.split(".")[0] : "";
        const pathSegments = window.location.pathname.split("/").filter(Boolean);
        const keepSegments =
          isGithubIo && pathSegments[0] && pathSegments[0] !== username ? 1 : 0;
        const repoPrefix = keepSegments ? `/${pathSegments.slice(0, keepSegments).join("/")}` : "";
        const route = `/${pathSegments.slice(keepSegments).join("/")}`;
        const query = window.location.search
          .replace(/^\?/, "")
          .replace(/&/g, "~and~");
        const redirectUrl =
          `${window.location.origin}${repoPrefix}/?${route}` +
          `${query ? `&${query}` : ""}${window.location.hash}`;

        window.location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
